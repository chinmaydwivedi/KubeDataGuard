name: kubedataguard

networks:
  dataguard:
    driver: bridge

volumes:
  postgres-data:
  redpanda-data:
  opensearch-data:
  redis-data:
  minio-data:
  clickhouse-data:

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: dataguard
      POSTGRES_USER: dataguard
      POSTGRES_PASSWORD: dataguard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataguard -d dataguard"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dataguard

  redpanda-0:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda-0:9092,external://host.docker.internal:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda-0:33145
      - --advertise-rpc-addr
      - redpanda-0:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - dataguard

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.7.4
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda-0:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda-0:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda-0:9644"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda-0
    networks:
      - dataguard

  opensearch:
    image: opensearchproject/opensearch:latest
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - dataguard

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis-data:/data
    networks:
      - dataguard

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    environment:
      CLICKHOUSE_DB: dataguard
      CLICKHOUSE_USER: dataguard
      CLICKHOUSE_PASSWORD: dataguard
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9009:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    profiles:
      - analytics
    networks:
      - dataguard

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    profiles:
      - object-store
    networks:
      - dataguard

  minio-mc:
    image: minio/mc:latest
    entrypoint: /bin/sh
    command: >
      -c 'until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      do sleep 1; done;
      mc mb -p local/kubedataguard-reports || true'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      - minio
    profiles:
      - object-store
    networks:
      - dataguard

  dataguard:
    build:
      context: .
    environment:
      POSTGRES_DSN: postgresql://dataguard:dataguard@postgres:5432/dataguard
      KAFKA_BOOTSTRAP_SERVERS: redpanda-0:9092
      ORDER_EVENTS_TOPIC: orders.events
      OPENSEARCH_URL: http://opensearch:9200
      ORDERS_INDEX: orders
      REDIS_URL: redis://redis:6379/0
      ORDER_CACHE_PREFIX: order
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: dataguard
      CLICKHOUSE_PASSWORD: dataguard
      CLICKHOUSE_DATABASE: dataguard
      CLICKHOUSE_TABLE: orders_analytics
      REPORT_DIR: /workspace/reports
      REPORT_STORE: ${REPORT_STORE:-local}
      REPORT_BUCKET: ${REPORT_BUCKET:-kubedataguard-reports}
      REPORT_PREFIX: ${REPORT_PREFIX:-local}
      REPORT_S3_ENDPOINT_URL: ${REPORT_S3_ENDPOINT_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ${HOME}/.kubedataguard/reports:/workspace/reports
    depends_on:
      postgres:
        condition: service_healthy
      redpanda-0:
        condition: service_started
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - dataguard
