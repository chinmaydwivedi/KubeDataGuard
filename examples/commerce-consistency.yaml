apiVersion: v1
kind: Secret
metadata:
  name: orders-postgres-secret
type: Opaque
stringData:
  dsn: postgresql://dataguard:dataguard@dataguard-postgres:5432/dataguard
---
apiVersion: v1
kind: Secret
metadata:
  name: orders-opensearch-secret
type: Opaque
stringData:
  url: http://dataguard-opensearch:9200
---
apiVersion: v1
kind: Secret
metadata:
  name: orders-redis-secret
type: Opaque
stringData:
  url: redis://dataguard-redis:6379/0
---
apiVersion: v1
kind: Secret
metadata:
  name: orders-clickhouse-secret
type: Opaque
stringData:
  url: http://dataguard-clickhouse:8123
  user: dataguard
  password: dataguard
---
apiVersion: v1
kind: Secret
metadata:
  name: orders-kafka-secret
type: Opaque
stringData:
  bootstrapServers: dataguard-redpanda:9092
---
apiVersion: dataguard.io/v1alpha1
kind: DataSource
metadata:
  name: orders-postgres
spec:
  type: postgres
  connectionSecret: orders-postgres-secret
  database: dataguard
  tables:
    - orders
---
apiVersion: dataguard.io/v1alpha1
kind: DerivedView
metadata:
  name: orders-search-index
spec:
  sourceRef: orders-postgres
  target:
    type: opensearch
    connectionSecret: orders-opensearch-secret
    index: orders
  pipeline:
    type: kafka
    connectionSecret: orders-kafka-secret
    topic: orders.events
---
apiVersion: dataguard.io/v1alpha1
kind: Invariant
metadata:
  name: paid-orders-indexed
  annotations:
    dataguard.io/checker-mode: job
    dataguard.io/checker-image: kubedataguard-dataguard:latest
spec:
  derivedViewRef: orders-search-index
  type: existence
  checkIntervalSeconds: 300
  maxLagSeconds: 60
  severity: critical
  sourceQuery: |
    select id from orders where status = 'paid'
  targetQuery: |
    ids in OpenSearch index `orders`
---
apiVersion: dataguard.io/v1alpha1
kind: Invariant
metadata:
  name: paid-orders-aggregate
  annotations:
    dataguard.io/checker-mode: job
    dataguard.io/checker-image: kubedataguard-dataguard:latest
spec:
  derivedViewRef: orders-search-index
  type: aggregate
  checkIntervalSeconds: 300
  maxLagSeconds: 60
  severity: critical
  sourceQuery: |
    select count(*), coalesce(sum(amount_cents), 0)
    from orders
    where status = 'paid'
  targetQuery: |
    OpenSearch count and sum(amount_cents)
    where status = 'paid'
---
apiVersion: dataguard.io/v1alpha1
kind: Invariant
metadata:
  name: paid-orders-checksum
  annotations:
    dataguard.io/checker-mode: job
    dataguard.io/checker-image: kubedataguard-dataguard:latest
spec:
  derivedViewRef: orders-search-index
  type: checksum
  checkIntervalSeconds: 300
  maxLagSeconds: 60
  checksumPrefixLength: 1
  severity: warning
  sourceQuery: |
    Prefix-bucket checksum over paid orders in Postgres.
  targetQuery: |
    Prefix-bucket checksum over paid orders in OpenSearch.
---
apiVersion: dataguard.io/v1alpha1
kind: Invariant
metadata:
  name: paid-orders-freshness
  annotations:
    dataguard.io/checker-mode: job
    dataguard.io/checker-image: kubedataguard-dataguard:latest
spec:
  derivedViewRef: orders-search-index
  type: freshness
  checkIntervalSeconds: 300
  maxLagSeconds: 60
  severity: critical
  sourceQuery: |
    select id, updated_at from orders where status = 'paid'
  targetQuery: |
    OpenSearch indexed_at must be within 60 seconds of source updated_at
---
apiVersion: dataguard.io/v1alpha1
kind: RepairPolicy
metadata:
  name: reconcile-missing-paid-orders
spec:
  invariantRef: paid-orders-indexed
  approvalRequired: true
  actions:
    - type: emit-reconcile-events
      batchSize: 500
---
apiVersion: dataguard.io/v1alpha1
kind: DerivedView
metadata:
  name: orders-redis-cache
spec:
  sourceRef: orders-postgres
  target:
    type: redis
    connectionSecret: orders-redis-secret
    keyPrefix: order
  pipeline:
    type: kafka
    connectionSecret: orders-kafka-secret
    topic: orders.events
---
apiVersion: dataguard.io/v1alpha1
kind: Invariant
metadata:
  name: paid-orders-redis-cache-freshness
  annotations:
    dataguard.io/checker-mode: job
    dataguard.io/checker-image: kubedataguard-dataguard:latest
spec:
  derivedViewRef: orders-redis-cache
  type: redis-freshness
  checkIntervalSeconds: 300
  maxLagSeconds: 60
  severity: warning
  sourceQuery: |
    select id, updated_at from orders where status = 'paid'
  targetQuery: |
    Redis key order:{id} must exist and have cached_at >= source updated_at
---
apiVersion: dataguard.io/v1alpha1
kind: RepairPolicy
metadata:
  name: invalidate-stale-paid-order-cache
spec:
  invariantRef: paid-orders-redis-cache-freshness
  approvalRequired: true
  actions:
    - type: invalidate-cache
      keyTemplate: order:{id}
---
apiVersion: dataguard.io/v1alpha1
kind: DerivedView
metadata:
  name: orders-clickhouse-analytics
spec:
  sourceRef: orders-postgres
  target:
    type: clickhouse
    connectionSecret: orders-clickhouse-secret
    database: dataguard
    table: orders_analytics
  pipeline:
    type: backfill
---
apiVersion: dataguard.io/v1alpha1
kind: Invariant
metadata:
  name: paid-orders-clickhouse-aggregate
  annotations:
    dataguard.io/checker-mode: job
    dataguard.io/checker-image: kubedataguard-dataguard:latest
spec:
  derivedViewRef: orders-clickhouse-analytics
  type: clickhouse-aggregate
  checkIntervalSeconds: 300
  maxLagSeconds: 60
  severity: warning
  sourceQuery: |
    select count(*), coalesce(sum(amount_cents), 0)
    from orders
    where status = 'paid'
  targetQuery: |
    ClickHouse count and sum(amount_cents) from orders_analytics where status = 'paid'
---
apiVersion: dataguard.io/v1alpha1
kind: RepairPolicy
metadata:
  name: backfill-paid-orders-clickhouse
spec:
  invariantRef: paid-orders-clickhouse-aggregate
  approvalRequired: true
  actions:
    - type: clickhouse-backfill
      table: orders_analytics
---
apiVersion: dataguard.io/v1alpha1
kind: Invariant
metadata:
  name: paid-orders-query-check
  annotations:
    dataguard.io/checker-mode: job
    dataguard.io/checker-image: kubedataguard-dataguard:latest
spec:
  derivedViewRef: orders-search-index
  type: query
  checkIntervalSeconds: 300
  maxLagSeconds: 60
  keyField: id
  sourceScanPageSize: 25
  compareFields:
    - status
    - amount_cents
    - currency
    - version
  sourceQuery: |
    select id, status, amount_cents, currency, version, updated_at
    from orders
    where status = 'paid'
      and updated_at <= now() - interval '60 seconds'
    order by updated_at asc, id asc
  targetQuery: |
    {
      "query": {
        "bool": {
          "filter": [
            {"term": {"status": "paid"}},
            {"range": {"updated_at": {"lte": "now-60s"}}}
          ]
        }
      }
    }
---
apiVersion: dataguard.io/v1alpha1
kind: RepairPolicy
metadata:
  name: reconcile-stale-paid-orders
spec:
  invariantRef: paid-orders-freshness
  approvalRequired: true
  actions:
    - type: emit-reconcile-events
      batchSize: 500
