apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: datasources.dataguard.io
spec:
  group: dataguard.io
  scope: Namespaced
  names:
    plural: datasources
    singular: datasource
    kind: DataSource
    shortNames:
      - dsrc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - type
                - connectionSecret
              properties:
                type:
                  type: string
                  enum: ["postgres", "kafka", "redis", "opensearch", "clickhouse"]
                connectionSecret:
                  type: string
                connectionSecretKey:
                  type: string
                  default: dsn
                database:
                  type: string
                tables:
                  type: array
                  items:
                    type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
