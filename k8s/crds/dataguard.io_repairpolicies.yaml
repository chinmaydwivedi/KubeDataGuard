apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: repairpolicies.dataguard.io
spec:
  group: dataguard.io
  scope: Namespaced
  names:
    plural: repairpolicies
    singular: repairpolicy
    kind: RepairPolicy
    shortNames:
      - rpol
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - invariantRef
                - actions
              properties:
                invariantRef:
                  type: string
                approvalRequired:
                  type: boolean
                  default: true
                actions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                    properties:
                      type:
                        type: string
                        enum: ["emit-reconcile-events", "call-webhook", "reindex-records", "replay-kafka", "invalidate-cache", "clickhouse-backfill", "run-job"]
                      batchSize:
                        type: integer
                      endpoint:
                        type: string
                      topic:
                        type: string
                      keyTemplate:
                        type: string
                      table:
                        type: string
                      jobTemplateRef:
                        type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
