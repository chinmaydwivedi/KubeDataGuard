apiVersion: v1
kind: Service
metadata:
  name: dataguard-postgres
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: dataguard-postgres-headless
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dataguard-postgres
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: postgres
spec:
  serviceName: dataguard-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubedataguard
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubedataguard
        app.kubernetes.io/component: postgres
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:17
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: dataguard
            - name: POSTGRES_USER
              value: dataguard
            - name: POSTGRES_PASSWORD
              value: dataguard
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - dataguard
                - -d
                - dataguard
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - dataguard
                - -d
                - dataguard
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: kubedataguard
          app.kubernetes.io/component: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dataguard-redpanda
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: redpanda
spec:
  selector:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: schema-registry
      port: 8081
      targetPort: schema-registry
    - name: pandaproxy
      port: 8082
      targetPort: pandaproxy
    - name: admin
      port: 9644
      targetPort: admin
---
apiVersion: v1
kind: Service
metadata:
  name: dataguard-redpanda-headless
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: redpanda
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: rpc
      port: 33145
      targetPort: rpc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dataguard-redpanda
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: redpanda
spec:
  serviceName: dataguard-redpanda-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubedataguard
      app.kubernetes.io/component: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubedataguard
        app.kubernetes.io/component: redpanda
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
          imagePullPolicy: IfNotPresent
          args:
            - redpanda
            - start
            - --kafka-addr
            - internal://0.0.0.0:9092
            - --advertise-kafka-addr
            - internal://dataguard-redpanda:9092
            - --pandaproxy-addr
            - internal://0.0.0.0:8082
            - --advertise-pandaproxy-addr
            - internal://dataguard-redpanda:8082
            - --schema-registry-addr
            - internal://0.0.0.0:8081
            - --rpc-addr
            - 0.0.0.0:33145
            - --advertise-rpc-addr
            - dataguard-redpanda-0.dataguard-redpanda-headless:33145
            - --mode
            - dev-container
            - --smp
            - "1"
            - --default-log-level=info
          ports:
            - name: kafka
              containerPort: 9092
            - name: schema-registry
              containerPort: 8081
            - name: pandaproxy
              containerPort: 8082
            - name: admin
              containerPort: 9644
            - name: rpc
              containerPort: 33145
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: redpanda-data
        labels:
          app.kubernetes.io/name: kubedataguard
          app.kubernetes.io/component: redpanda
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dataguard-opensearch
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: opensearch
spec:
  selector:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: http
    - name: perf-analyzer
      port: 9600
      targetPort: perf-analyzer
---
apiVersion: v1
kind: Service
metadata:
  name: dataguard-opensearch-headless
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: opensearch
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dataguard-opensearch
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: opensearch
spec:
  serviceName: dataguard-opensearch-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubedataguard
      app.kubernetes.io/component: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubedataguard
        app.kubernetes.io/component: opensearch
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: set-vm-max-map-count
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - sysctl -w vm.max_map_count=262144
          securityContext:
            privileged: true
      securityContext:
        fsGroup: 1000
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
            - name: perf-analyzer
              containerPort: 9600
          env:
            - name: discovery.type
              value: single-node
            - name: plugins.security.disabled
              value: "true"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
        labels:
          app.kubernetes.io/name: kubedataguard
          app.kubernetes.io/component: opensearch
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
