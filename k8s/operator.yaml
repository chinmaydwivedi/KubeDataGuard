apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubedataguard-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubedataguard-operator
rules:
  - apiGroups: ["dataguard.io"]
    resources: ["datasources", "derivedviews", "invariants", "repairpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["dataguard.io"]
    resources: ["invariants/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubedataguard-operator
subjects:
  - kind: ServiceAccount
    name: kubedataguard-operator
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubedataguard-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubedataguard-operator
  namespace: default
  labels:
    app.kubernetes.io/name: kubedataguard
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubedataguard
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubedataguard
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: kubedataguard-operator
      containers:
        - name: manager
          image: kubedataguard-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=0
            - --health-probe-bind-address=:8081
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
